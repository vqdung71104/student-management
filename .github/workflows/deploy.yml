name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/student-app

            # Create or update .env file
            echo "Creating or updating .env file..."
            if [ ! -f .env ]; then
              echo "Creating new .env file."
              echo "ORCHESTRATOR_API_KEY=${{ secrets.ORCHESTRATOR_API_KEY }}" > .env
            else
              echo "Updating existing .env file."
              grep -q "^ORCHESTRATOR_API_KEY=" .env && sed -i "s/^ORCHESTRATOR_API_KEY=.*/ORCHESTRATOR_API_KEY=${{ secrets.ORCHESTRATOR_API_KEY }}/" .env || echo "ORCHESTRATOR_API_KEY=${{ secrets.ORCHESTRATOR_API_KEY }}" >> .env
            fi

            # Start services
            echo "Starting services with docker compose..."
            docker compose -f docker-compose.prod.yml up -d --build

            echo "Deployment completed successfully."