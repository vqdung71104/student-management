name: CI/CD - Build, Test and Push

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # STEP 1: Integration Test
  # Runs on EVERY push and PR.
  # Builds services in dev mode, waits for
  # health, then runs backend smoke tests.
  # ==========================================
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create .env file for CI
        run: |
          cat > .env << 'EOF'
          MYSQL_PASSWORD=123456
          MYSQL_USER=root
          MYSQL_DB=student_management
          MYSQL_PORT=3307
          SECRET_KEY=test_secret_key_for_ci_cd_only_not_for_production
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=120
          BACKEND_PORT=8000
          FRONTEND_PORT=5173
          BUILD_TARGET=development
          EOF

      - name: Build and start services (dev mode)
        run: docker compose up -d --build

      - name: Wait for backend to be healthy (max 2 min)
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "✅ Backend is ready after ${i} attempts!"
              exit 0
            fi
            echo "  Attempt ${i}/24 - retrying in 5s..."
            sleep 5
          done
          echo "❌ Backend failed to start within 120 seconds"
          docker compose logs backend
          exit 1

      - name: Run backend integration tests
        run: |
          docker compose exec -T backend pytest tests/test_api_call.py -v --tb=short

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "====== backend logs ======"
          docker compose logs backend
          echo "====== mysql logs ======"
          docker compose logs mysql

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ==========================================
  # STEP 2a: Build & Push Backend image
  # Only runs AFTER integration-test passes,
  # and only on push to main/develop (not PR).
  # ==========================================
  push-backend:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=v1,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Backend image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # STEP 2b: Build & Push Frontend image
  # Only runs AFTER integration-test passes,
  # and only on push to main/develop (not PR).
  # ==========================================
  push-frontend:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=v1,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Fail on insecure absolute API URLs in frontend source
        run: |
          echo "Checking frontend source for insecure absolute API URLs..."
          # Scan only executable frontend code files and skip static assets.
          FILES=$(find frontend/src \
            -type f \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) \
            ! -path "frontend/src/assets/*")
          # Only reject HTTP (insecure) URLs; HTTPS and relative paths are OK.
          if echo "$FILES" | xargs grep -n -E "['\"]http://(127\\.0\\.0\\.1:8000|localhost:8000)"; then
            echo "❌ Insecure absolute API URL (http://) detected in frontend source"
            exit 1
          fi
          echo "✅ No insecure absolute API URL found in frontend source"

      - name: Build and push Frontend image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

#Deploy
  deploy:
      needs: [push-backend, push-frontend] # Chỉ chạy sau khi push image xong
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      timeout-minutes: 20
      permissions:
        contents: read
        packages: read
      steps:
        - name: Deploy to VPS via SSH
          uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            GH_ACTOR: ${{ github.actor }}
            IMAGE_TAG: ${{ github.sha }}
          with:
            host: ${{ secrets.VPS_IP }}
            username: ubuntu
            key: ${{ secrets.VPS_SSH_KEY }}
            envs: GH_TOKEN,GH_ACTOR,IMAGE_TAG
            script: |
              set -euo pipefail

              cd student-app
              git pull origin main

              PREV_BACKEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' student-management-backend-prod 2>/dev/null || true)"
              PREV_FRONTEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' student-management-frontend-prod 2>/dev/null || true)"

              extract_tag() {
                if [ -z "${1:-}" ]; then
                  echo ""
                else
                  echo "$1" | awk -F: '{print $NF}'
                fi
              }

              PREV_BACKEND_TAG="$(extract_tag "$PREV_BACKEND_IMAGE")"
              PREV_FRONTEND_TAG="$(extract_tag "$PREV_FRONTEND_IMAGE")"

              print_rollback_suggestion() {
                echo "================ ROLLBACK SUGGESTION ================"
                echo "Current deploy tag: ${IMAGE_TAG}"
                echo "Previous backend image: ${PREV_BACKEND_IMAGE:-unknown}"
                echo "Previous frontend image: ${PREV_FRONTEND_IMAGE:-unknown}"
                if [ -n "${PREV_BACKEND_TAG}" ] && [ "${PREV_BACKEND_TAG}" = "${PREV_FRONTEND_TAG}" ]; then
                  echo "1) sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${PREV_BACKEND_TAG}/' .env"
                  echo "2) docker compose -f docker-compose.prod.yml pull backend frontend"
                  echo "3) docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend frontend"
                else
                  echo "1) Xác định lại tag ổn định gần nhất và cập nhật IMAGE_TAG trong .env"
                  echo "2) docker compose -f docker-compose.prod.yml pull backend frontend"
                  echo "3) docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend frontend"
                fi
                echo "====================================================="
              }

              echo "Using image tag: ${IMAGE_TAG}"
              if [ -f .env ]; then
                if grep -q '^IMAGE_TAG=' .env; then
                  sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
                else
                  echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
                fi
              else
                echo "IMAGE_TAG=${IMAGE_TAG}" > .env
              fi

              echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
              echo "Cleaning up old images to make space..."
              docker image prune -f
              echo "Pulling new images..."
              docker compose -f docker-compose.prod.yml pull backend frontend
              # Always recreate backend so new API routes are applied after each push
              echo "Restarting containers..."
              docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend
              docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate frontend

              echo "Running post-deploy health checks..."
              docker compose -f docker-compose.prod.yml ps
              echo "Running image tags after deploy:"
              docker compose -f docker-compose.prod.yml images backend frontend
              docker inspect --format='{{.Name}} -> {{.Config.Image}}' student-management-backend-prod
              docker inspect --format='{{.Name}} -> {{.Config.Image}}' student-management-frontend-prod
              if ! docker exec student-management-frontend-prod sh -c "wget --no-verbose --tries=1 --spider http://localhost:80/health"; then
                echo "❌ Frontend health check failed"
                print_rollback_suggestion
                exit 1
              fi
              if ! docker exec student-management-frontend-prod sh -c "wget -q -O /tmp/index.html http://localhost:80/ && test -s /tmp/index.html"; then
                echo "❌ Frontend index verification failed"
                print_rollback_suggestion
                exit 1
              fi

              echo "Scanning deployed frontend bundle for insecure absolute API URLs..."
              if docker exec student-management-frontend-prod sh -c "grep -R -n -E 'http://127\\.0\\.0\\.1:8000|http://localhost:8000' /usr/share/nginx/html"; then
                echo "❌ Deployed frontend bundle still contains insecure absolute API URL (http://)"
                print_rollback_suggestion
                exit 1
              fi
              echo "✅ Deployed frontend bundle has no insecure absolute API URL"

              docker image prune -f  
              docker image prune -a -f --filter "until=24h"