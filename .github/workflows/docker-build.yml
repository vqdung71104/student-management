name: CI/CD - Build, Test and Push

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-cd-${{ github.ref }}
  # Bạn có thể đổi thành false nếu không muốn GitHub tự động hủy các bản build cũ khi re-run
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # STEP 1: Integration Test
  # ==========================================
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX 1: Đăng nhập trước khi Test để tránh Rate Limit khi load metadata/image
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file for CI
        run: |
          cat > .env << 'EOF'
          MYSQL_PASSWORD=123456
          MYSQL_USER=root
          MYSQL_DB=student_management
          MYSQL_PORT=3307
          SECRET_KEY=test_secret_key_for_ci_cd_only_not_for_production
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=120
          BACKEND_PORT=8000
          FRONTEND_PORT=5173
          BUILD_TARGET=development
          EOF

      # FIX 2: Thực hiện pull trước khi build để đảm bảo metadata sạch sẽ
      - name: Build and start services (dev mode)
        run: |
          docker compose pull
          docker compose up -d --build

      - name: Wait for backend to be healthy (max 2 min)
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "✅ Backend is ready after ${i} attempts!"
              exit 0
            fi
            echo "  Attempt ${i}/24 - retrying in 5s..."
            sleep 5
          done
          echo "❌ Backend failed to start within 120 seconds"
          docker compose logs backend
          exit 1

      - name: Run backend integration tests
        run: |
          docker compose exec -T backend pytest tests/test_api_call.py -v --tb=short

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "====== backend logs ======"
          docker compose logs backend
          echo "====== mysql logs ======"
          docker compose logs mysql

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ==========================================
  # STEP 2a: Build & Push Backend image
  # ==========================================
  push-backend:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FIX 3: Sử dụng Full SHA làm tag để khớp hoàn toàn với bước Deploy
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=v1,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # STEP 2b: Build & Push Frontend image
  # ==========================================
  push-frontend:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FIX 4: Đồng bộ tag Full SHA cho Frontend
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=v1,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Fail on insecure absolute API URLs in frontend source
        run: |
          echo "Checking frontend source for insecure absolute API URLs..."
          FILES=$(find frontend/src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) ! -path "frontend/src/assets/*")
          if echo "$FILES" | xargs grep -n -E "['\"]http://(127\\.0\\.0\\.1:8000|localhost:8000)"; then
            echo "❌ Insecure absolute API URL (http://) detected in frontend source"
            exit 1
          fi
          echo "✅ No insecure absolute API URL found in frontend source"

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

  # ==========================================
  # STEP 3: Deploy
  # ==========================================
  deploy:
    needs: [push-backend, push-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN,GH_ACTOR,IMAGE_TAG
          script: |
            set -euo pipefail
            cd student-app
            # Sử dụng reset --hard để tránh xung đột Divergent branches trên VPS
            git fetch origin main
            git reset --hard origin/main

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker image prune -f
            
            echo "Pulling images with tag: ${IMAGE_TAG}"
            # Cập nhật .env
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend frontend
            
            docker compose -f docker-compose.prod.yml ps
            docker image prune -a -f --filter "until=24h"