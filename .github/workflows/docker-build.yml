name: CI/CD - Build, Test and Push

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # STEP 1: Integration Test
  # Runs on EVERY push and PR.
  # Builds services in dev mode, waits for
  # health, then runs backend smoke tests.
  # ==========================================
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for CI
        run: |
          cat > .env << 'EOF'
          MYSQL_PASSWORD=test_password_123
          MYSQL_USER=root
          MYSQL_DB=student_management
          MYSQL_PORT=3307
          SECRET_KEY=test_secret_key_for_ci_cd_only_not_for_production
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          BACKEND_PORT=8000
          FRONTEND_PORT=5173
          BUILD_TARGET=development
          EOF

      - name: Build and start services (dev mode)
        run: docker compose up -d --build

      - name: Wait for backend to be healthy (max 2 min)
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "✅ Backend is ready after ${i} attempts!"
              exit 0
            fi
            echo "  Attempt ${i}/24 - retrying in 5s..."
            sleep 5
          done
          echo "❌ Backend failed to start within 120 seconds"
          docker compose logs backend
          exit 1

      - name: Run backend integration tests
        run: |
          docker compose exec -T backend pytest app/tests/test_api_call.py -v --tb=short

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "====== backend logs ======"
          docker compose logs backend
          echo "====== mysql logs ======"
          docker compose logs mysql

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ==========================================
  # STEP 2a: Build & Push Backend image
  # Only runs AFTER integration-test passes,
  # and only on push to main/develop (not PR).
  # ==========================================
  push-backend:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=v1,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # STEP 2b: Build & Push Frontend image
  # Only runs AFTER integration-test passes,
  # and only on push to main/develop (not PR).
  # ==========================================
  push-frontend:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=v1,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

#Deploy
  deploy:
      needs: [push-backend, push-frontend] # Chỉ chạy sau khi push image xong
      runs-on: ubuntu-latest
      steps:
        - name: Deploy to VPS via SSH
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.VPS_IP }}
            username: ubuntu
            key: ${{ secrets.VPS_SSH_KEY }}
            script: |
              cd student-app
              docker compose pull
              docker compose up -d
